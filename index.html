<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Deepseek 模拟版</title>
  <script>
    // 已内置Deepseek API密钥，无需额外配置
    const DEEPSEEK_API_KEY = "sk-40fcf84ac33f4a8c9ca8e5fa92861b89";
    // Deepseek官方当前可用全量模型（仅保留你指定的3个）
    const MODEL_LIST = [
      { label: "Deepseek Chat", value: "deepseek-chat" },
      { label: "Deepseek R1", value: "deepseek-reasoner" },
      { label: "Deepseek R1 Large", value: "deepseek-reasoner-large" }
    ];
    // 访问密码
    const ACCESS_PASSWORD = "330722";
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* 核心色彩 */
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --error-color: #ef4444;
      
      /* 液态玻璃分层系统 */
      --glass-sidebar: rgba(15, 23, 42, 0.7);
      --glass-chat: rgba(255, 255, 255, 0.06);
      --glass-input: rgba(15, 23, 42, 0.8);
      --glass-card: rgba(255, 255, 255, 0.08);
      --glass-border-weak: rgba(255, 255, 255, 0.08);
      --glass-border-medium: rgba(255, 255, 255, 0.12);
      --glass-border-strong: rgba(255, 255, 255, 0.18);
      
      /* 模糊层级 */
      --blur-strong: blur(32px) saturate(180%);
      --blur-medium: blur(24px) saturate(180%);
      --blur-weak: blur(20px) saturate(180%);
      
      /* 阴影层级 */
      --shadow-sidebar: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      --shadow-input: 0 8px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      --shadow-chat: 0 4px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      --shadow-btn: 0 2px 8px rgba(99, 102, 241, 0.3);
      --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      
      /* 过渡动画 */
      --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
      position: relative;
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* 背景噪点增强玻璃质感 */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ========== 登录页样式 ========== */
    .login-page {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: var(--transition-normal);
    }

    .login-page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--glass-card);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border: 1px solid var(--glass-border-medium);
      border-radius: 24px;
      box-shadow: var(--shadow-card);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: loginFadeIn 0.4s ease;
    }

    @keyframes loginFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-title {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-title h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .login-title p {
      font-size: 15px;
      color: var(--text-tertiary);
    }

    .login-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-input {
      width: 100%;
      min-height: 48px;
      padding: 0 16px;
      background: var(--glass-input);
      border: 1px solid var(--glass-border-medium);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 16px;
      transition: var(--transition-fast);
    }

    .login-input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .login-input::placeholder {
      color: var(--text-tertiary);
    }

    .error-tip {
      font-size: 14px;
      color: var(--error-color);
      min-height: 20px;
    }

    .login-btn {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      background: var(--accent-color);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      box-shadow: var(--shadow-btn);
    }

    .login-btn:hover, .login-btn:active {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    /* ========== 主界面样式 ========== */
    /* 侧边栏抽屉 */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      height: 100dvh;
      background: var(--glass-sidebar);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border-right: 1px solid var(--glass-border-medium);
      box-shadow: var(--shadow-sidebar);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: var(--transition-normal);
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    }

    /* 手机端侧边栏默认收起 */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-mask {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 99;
        opacity: 0;
        pointer-events: none;
        transition: var(--transition-normal);
      }
      .sidebar-mask.show {
        opacity: 1;
        pointer-events: all;
      }
    }

    /* 侧边栏头部 */
    .sidebar-header {
      padding: 20px 16px;
    }

    .new-chat-btn {
      width: 100%;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      background: var(--glass-chat);
      border: 1px solid var(--glass-border-medium);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition-fast);
      backdrop-filter: var(--blur-weak);
      -webkit-backdrop-filter: var(--blur-weak);
    }

    .new-chat-btn:hover, .new-chat-btn:active {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--glass-border-strong);
      transform: translateY(-1px);
    }

    /* 对话列表 */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      min-height: 44px;
      padding: 0 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition-fast);
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
    }

    .chat-item:hover, .chat-item:active {
      background: rgba(255, 255, 255, 0.08);
    }

    .chat-item.active {
      background: var(--accent-color);
      font-weight: 500;
    }

    /* 侧边栏底部设置 */
    .sidebar-footer {
      padding: 20px 16px;
      border-top: 1px solid var(--glass-border-weak);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      color: var(--text-primary);
      min-height: 44px;
      gap: 10px;
    }

    /* 模型选择下拉框 */
    .model-select {
      flex: 1;
      min-height: 36px;
      padding: 0 10px;
      background: var(--glass-chat);
      border: 1px solid var(--glass-border-medium);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .model-select:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .model-select option {
      background: #0f172a;
      color: var(--text-primary);
    }

    /* 苹果原生风格开关 */
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      transition: var(--transition-fast);
      border: 1px solid var(--glass-border-weak);
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      border-radius: 50%;
      transition: var(--transition-fast);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    input:checked + .toggle-slider {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    /* 主内容区 */
    .main-container {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
      padding-left: 280px;
      transition: var(--transition-normal);
      opacity: 0;
      pointer-events: none;
    }

    .main-container.show {
      opacity: 1;
      pointer-events: all;
    }

    /* 手机端主内容区全屏 */
    @media (max-width: 768px) {
      .main-container {
        padding-left: 0;
      }
    }

    /* 顶部导航栏 */
    .header-bar {
      height: 60px;
      min-height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--glass-border-weak);
      background: var(--glass-sidebar);
      backdrop-filter: var(--blur-medium);
      -webkit-backdrop-filter: var(--blur-medium);
      padding-top: env(safe-area-inset-top);
    }

    .menu-btn {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      flex-shrink: 0;
    }

    .menu-btn:hover, .menu-btn:active {
      background: rgba(255, 255, 255, 0.08);
    }

    /* 桌面端隐藏菜单按钮 */
    @media (min-width: 769px) {
      .menu-btn {
        display: none;
      }
    }

    .chat-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* 聊天内容区 */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      scroll-behavior: smooth;
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
    }

    /* 空状态 */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      margin-top: -60px;
    }

    .empty-state h1 {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .empty-state p {
      font-size: 16px;
      color: var(--text-tertiary);
      text-align: center;
    }

    /* 消息气泡 */
    .message {
      display: flex;
      gap: 12px;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
    }

    .message.user .message-avatar {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      order: 2;
    }

    .message-content {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .message.assistant .message-content {
      background: var(--glass-chat);
      backdrop-filter: var(--blur-weak);
      -webkit-backdrop-filter: var(--blur-weak);
      border: 1px solid var(--glass-border-medium);
      box-shadow: var(--shadow-chat);
      color: var(--text-primary);
    }

    .message.user .message-content {
      background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
      color: white;
      order: 1;
      box-shadow: var(--shadow-btn);
    }

    /* 消息内容格式化 */
    .message-content p {
      margin: 0 0 12px 0;
    }

    .message-content p:last-child {
      margin-bottom: 0;
    }

    .message-content code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 0.9em;
      color: #f472b6;
    }

    .message-content pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 14px 0;
      border: 1px solid var(--glass-border-weak);
    }

    .message-content pre code {
      background: none;
      padding: 0;
      color: var(--text-primary);
    }

    /* 加载动画 */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 24px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: loading 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes loading {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* 底部输入框区域 */
    .input-container {
      position: fixed;
      bottom: 0;
      left: 280px;
      right: 0;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      background: transparent;
      z-index: 50;
    }

    @media (max-width: 768px) {
      .input-container {
        left: 0;
      }
    }

    .input-wrapper {
      max-width: 900px;
      margin: 0 auto;
      background: var(--glass-input);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      border: 1px solid var(--glass-border-medium);
      border-radius: 18px;
      box-shadow: var(--shadow-input);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: var(--transition-fast);
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-color);
      box-shadow: 0 8px 40px rgba(99, 102, 241, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    #message-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
      resize: none;
      max-height: 180px;
      min-height: 24px;
    }

    #message-input::placeholder {
      color: var(--text-tertiary);
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .send-btn {
      min-height: 36px;
      padding: 8px 20px;
      border-radius: 10px;
      background: var(--accent-color);
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-fast);
      box-shadow: var(--shadow-btn);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .send-btn:hover:not(:disabled), .send-btn:active:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <!-- ========== 登录页 ========== -->
  <div class="login-page" id="login-page">
    <div class="login-card">
      <div class="login-title">
        <h1>Deepseek 模拟版</h1>
        <p>请输入访问密码进入系统</p>
      </div>
      <div class="login-input-group">
        <input type="password" class="login-input" id="password-input" placeholder="请输入访问密码">
        <div class="error-tip" id="error-tip"></div>
      </div>
      <button class="login-btn" id="login-btn">点击进入</button>
    </div>
  </div>

  <!-- ========== 主界面 ========== -->
  <!-- 侧边栏遮罩（手机端用） -->
  <div class="sidebar-mask" id="sidebar-mask"></div>

  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="new-chat-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        新建对话
      </button>
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">
      <!-- 模型切换 -->
      <div class="setting-item">
        <span>模型选择</span>
        <select class="model-select" id="model-select"></select>
      </div>
      <!-- 深度思索开关 -->
      <div class="setting-item">
        <span>深度思索</span>
        <label class="toggle-switch">
          <input type="checkbox" id="reasoning-switch">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <!-- 联网搜索开关 -->
      <div class="setting-item">
        <span>联网搜索</span>
        <label class="toggle-switch">
          <input type="checkbox" id="online-search-switch">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main-container" id="main-container">
    <!-- 顶部导航栏 -->
    <div class="header-bar">
      <button class="menu-btn" id="menu-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="chat-title" id="chat-title">Deepseek Chat</div>
    </div>

    <!-- 聊天内容区 -->
    <div class="chat-container" id="chat-container">
      <div class="empty-state">
        <h1>Deepseek Chat</h1>
        <p>有什么可以帮你的吗？</p>
      </div>
    </div>

    <!-- 输入框区域 -->
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
        <div class="input-footer">
          <button class="send-btn" id="send-btn" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 全局状态
    let chatList = JSON.parse(localStorage.getItem('deepseek_chat_list')) || [];
    let currentChatId = localStorage.getItem('deepseek_current_chat_id') || null;
    let currentChatMessages = [];
    let isStreaming = false;
    let abortController = null;

    // DOM元素
    const loginPageEl = document.getElementById('login-page');
    const mainContainerEl = document.getElementById('main-container');
    const passwordInputEl = document.getElementById('password-input');
    const loginBtnEl = document.getElementById('login-btn');
    const errorTipEl = document.getElementById('error-tip');
    const sidebarEl = document.getElementById('sidebar');
    const sidebarMaskEl = document.getElementById('sidebar-mask');
    const menuBtnEl = document.getElementById('menu-btn');
    const chatListEl = document.getElementById('chat-list');
    const chatContainerEl = document.getElementById('chat-container');
    const chatTitleEl = document.getElementById('chat-title');
    const messageInputEl = document.getElementById('message-input');
    const sendBtnEl = document.getElementById('send-btn');
    const newChatBtnEl = document.getElementById('new-chat-btn');
    const modelSelectEl = document.getElementById('model-select');
    const reasoningSwitchEl = document.getElementById('reasoning-switch');
    const onlineSearchSwitchEl = document.getElementById('online-search-switch');

    // 初始化
    init();

    function init() {
      // 初始化模型选择下拉框
      initModelSelect();
      // 检查登录状态
      checkLoginStatus();
      // 绑定登录事件
      bindLoginEvent();
      // 绑定主界面事件
      bindMainEvent();
    }

    // 初始化模型选择器
    function initModelSelect() {
      // 渲染所有模型选项
      MODEL_LIST.forEach(model => {
        const option = document.createElement('option');
        option.value = model.value;
        option.textContent = model.label;
        modelSelectEl.appendChild(option);
      });
      // 默认选中第一个主模型
      const savedModel = localStorage.getItem('deepseek_selected_model') || MODEL_LIST[0].value;
      modelSelectEl.value = savedModel;
      // 监听模型切换
      modelSelectEl.addEventListener('change', () => {
        localStorage.setItem('deepseek_selected_model', modelSelectEl.value);
      });
    }

    // 检查登录状态
    function checkLoginStatus() {
      const isLoggedIn = localStorage.getItem('deepseek_is_logged_in') === 'true';
      if (isLoggedIn) {
        enterChatPage();
      }
    }

    // 绑定登录事件
    function bindLoginEvent() {
      // 点击登录按钮
      loginBtnEl.addEventListener('click', verifyPassword);
      // 回车登录
      passwordInputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          verifyPassword();
        }
      });
    }

    // 验证密码
    function verifyPassword() {
      const inputPassword = passwordInputEl.value.trim();
      if (!inputPassword) {
        errorTipEl.textContent = '请输入访问密码';
        return;
      }
      if (inputPassword !== ACCESS_PASSWORD) {
        errorTipEl.textContent = '密码错误，请重新输入';
        passwordInputEl.value = '';
        return;
      }
      // 密码正确，记录登录状态，进入聊天页
      localStorage.setItem('deepseek_is_logged_in', 'true');
      enterChatPage();
    }

    // 进入聊天页面
    function enterChatPage() {
      loginPageEl.classList.add('hidden');
      mainContainerEl.classList.add('show');
      // 初始化聊天功能
      initChatFunction();
    }

    // 绑定主界面事件
    function bindMainEvent() {
      // 侧边栏控制（手机端）
      menuBtnEl.addEventListener('click', toggleSidebar);
      sidebarMaskEl.addEventListener('click', toggleSidebar);
    }

    // 初始化聊天功能
    function initChatFunction() {
      // 恢复开关状态
      reasoningSwitchEl.checked = localStorage.getItem('deepseek_reasoning_enabled') === 'true';
      onlineSearchSwitchEl.checked = localStorage.getItem('deepseek_online_search_enabled') === 'true';

      // 开关状态保存
      reasoningSwitchEl.addEventListener('change', () => {
        localStorage.setItem('deepseek_reasoning_enabled', reasoningSwitchEl.checked);
      });
      onlineSearchSwitchEl.addEventListener('change', () => {
        localStorage.setItem('deepseek_online_search_enabled', onlineSearchSwitchEl.checked);
      });

      // 渲染对话列表
      renderChatList();

      // 加载当前对话
      if (currentChatId && chatList.find(chat => chat.id === currentChatId)) {
        loadChat(currentChatId);
      } else {
        createNewChat();
      }

      // 事件监听
      messageInputEl.addEventListener('input', handleInputChange);
      messageInputEl.addEventListener('keydown', handleKeyDown);
      sendBtnEl.addEventListener('click', sendMessage);
      newChatBtnEl.addEventListener('click', createNewChat);

      // 自动调整输入框高度
      messageInputEl.addEventListener('input', autoResizeTextarea);
    }

    // 侧边栏切换
    function toggleSidebar() {
      sidebarEl.classList.toggle('open');
      sidebarMaskEl.classList.toggle('show');
    }

    // 新建对话
    function createNewChat() {
      const chatId = Date.now().toString();
      const newChat = {
        id: chatId,
        title: '新对话',
        messages: [],
        createTime: Date.now()
      };

      chatList.unshift(newChat);
      saveChatList();
      renderChatList();
      loadChat(chatId);
      messageInputEl.focus();
      // 手机端新建对话后关闭侧边栏
      if (window.innerWidth <= 768) {
        toggleSidebar();
      }
    }

    // 渲染对话列表
    function renderChatList() {
      chatListEl.innerHTML = '';
      chatList.forEach(chat => {
        const chatItem = document.createElement('div');
        chatItem.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
        chatItem.textContent = chat.title;
        chatItem.addEventListener('click', () => {
          loadChat(chat.id);
          if (window.innerWidth <= 768) toggleSidebar();
        });
        chatListEl.appendChild(chatItem);
      });
    }

    // 加载对话
    function loadChat(chatId) {
      const chat = chatList.find(c => c.id === chatId);
      if (!chat) return;

      currentChatId = chatId;
      currentChatMessages = chat.messages;
      chatTitleEl.textContent = chat.title;
      localStorage.setItem('deepseek_current_chat_id', chatId);
      renderChatMessages();
      renderChatList();
    }

    // 渲染聊天消息
    function renderChatMessages() {
      chatContainerEl.innerHTML = '';

      if (currentChatMessages.length === 0) {
        chatContainerEl.innerHTML = `
          <div class="empty-state">
            <h1>Deepseek Chat</h1>
            <p>有什么可以帮你的吗？</p>
          </div>
        `;
        return;
      }

      currentChatMessages.forEach(msg => {
        const messageEl = createMessageElement(msg);
        chatContainerEl.appendChild(messageEl);
      });

      scrollToBottom();
    }

    // 创建消息元素
    function createMessageElement(msg) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${msg.role}`;

      const avatarEl = document.createElement('div');
      avatarEl.className = 'message-avatar';
      avatarEl.textContent = msg.role === 'assistant' ? 'D' : '你';

      const contentEl = document.createElement('div');
      contentEl.className = 'message-content';
      contentEl.innerHTML = formatMessageContent(msg.content);

      messageEl.appendChild(avatarEl);
      messageEl.appendChild(contentEl);

      return messageEl;
    }

    // 格式化消息内容
    function formatMessageContent(content) {
      let formatted = content
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // 代码块
      formatted = formatted.replace(/```([\s\S]*?)```/g, (match, code) => {
        return `<pre><code>${code}</code></pre>`;
      });

      // 行内代码
      formatted = formatted.replace(/`([^`]+)`/g, (match, code) => {
        return `<code>${code}</code>`;
      });

      // 换行
      formatted = formatted.replace(/\n/g, '<br>');
      return formatted;
    }

    // 输入框变化处理
    function handleInputChange() {
      const content = messageInputEl.value.trim();
      sendBtnEl.disabled = !content || isStreaming;
    }

    // 键盘事件（保留Shift+Enter换行，无提示）
    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // 自动调整输入框高度
    function autoResizeTextarea() {
      messageInputEl.style.height = 'auto';
      messageInputEl.style.height = Math.min(messageInputEl.scrollHeight, 180) + 'px';
    }

    // 发送消息
    async function sendMessage() {
      const content = messageInputEl.value.trim();
      if (!content || isStreaming) return;

      // 重置输入框
      messageInputEl.value = '';
      autoResizeTextarea();
      sendBtnEl.disabled = true;

      // 添加用户消息
      const userMessage = { role: 'user', content };
      currentChatMessages.push(userMessage);
      updateCurrentChat();
      renderChatMessages();

      // 开始流式请求
      isStreaming = true;
      abortController = new AbortController();

      // 添加AI消息占位
      const aiMessage = { role: 'assistant', content: '' };
      currentChatMessages.push(aiMessage);
      renderChatMessages();

      const aiMessageEl = chatContainerEl.lastChild;
      const aiContentEl = aiMessageEl.querySelector('.message-content');

      try {
        const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: modelSelectEl.value, // 使用选中的模型
            messages: currentChatMessages.slice(0, -1),
            stream: true,
            enable_online_search: onlineSearchSwitchEl.checked,
            reasoning_effort: reasoningSwitchEl.checked ? 'medium' : 'none'
          }),
          signal: abortController.signal,
        });

        if (!response.ok) throw new Error('请求失败，请检查API密钥是否正确');

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');

        // 处理流式响应
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n').filter(line => line.trim() !== '');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;

              try {
                const parsed = JSON.parse(data);
                const content = parsed.choices[0]?.delta?.content || '';
                if (content) {
                  aiMessage.content += content;
                  aiContentEl.innerHTML = formatMessageContent(aiMessage.content);
                  scrollToBottom();
                }
              } catch (e) {}
            }
          }
        }

        // 更新对话标题（首次对话）
        if (currentChatMessages.length <= 2) {
          updateChatTitle();
        }

      } catch (error) {
        if (error.name !== 'AbortError') {
          aiMessage.content += `\n\n出错了：${error.message}`;
          aiContentEl.innerHTML = formatMessageContent(aiMessage.content);
        }
      } finally {
        isStreaming = false;
        abortController = null;
        updateCurrentChat();
        handleInputChange();
      }
    }

    // 更新当前对话数据
    function updateCurrentChat() {
      const chatIndex = chatList.findIndex(c => c.id === currentChatId);
      if (chatIndex !== -1) {
        chatList[chatIndex].messages = currentChatMessages;
        saveChatList();
      }
    }

    // 更新对话标题
    async function updateChatTitle() {
      if (currentChatMessages.length < 1) return;
      const firstMessage = currentChatMessages[0].content.slice(0, 20);
      const chatIndex = chatList.findIndex(c => c.id === currentChatId);
      if (chatIndex !== -1) {
        chatList[chatIndex].title = firstMessage;
        chatTitleEl.textContent = firstMessage;
        saveChatList();
        renderChatList();
      }
    }

    // 保存对话列表
    function saveChatList() {
      localStorage.setItem('deepseek_chat_list', JSON.stringify(chatList));
    }

    // 滚动到底部
    function scrollToBottom() {
      chatContainerEl.scrollTop = chatContainerEl.scrollHeight;
    }
  </script>
</body>
</html>
